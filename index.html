<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>To-Do-List</title>
  </head>
  <body>
    <h1>ToDo-List</h1>
    <div class="container-cls">
      <input
        type="text"
        class="input-cls"
        id="input-id"
        placeholder="Enter Your To-Do...!"
      />
      <button class="btn-cls" id="add-btn-id">
        <img src="./icons/add.png" alt="Add Task" class="add-img-cls" />
      </button>
    </div>
    <ul id="ul-id" class="ul-cls"></ul>
  </body>
  <script src="index.js"></script>
</html>
